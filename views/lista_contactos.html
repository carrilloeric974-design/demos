$def with(contactos)

<h1>Lista contactos</h1>

<table border="1">
    <tr>
        <th>ID</th>
        <th>Nombre</th>
        <th>Primer Apellido</th>
        <th>Segundo Apellido</th>
        <th>Email</th>
        <th>Teléfono</th>
        <th>Acciones</th>
    </tr>
    $for contacto in contactos:
        <tr>
            <td>$contacto['id_contacto']</td>
            <td>$contacto['nombre']</td>
            <td>$contacto['primer_apellido']</td>
            <td>$contacto['segundo_apellido']</td>
            <td>$contacto['email']</td>
            <td>$contacto['telefono']</td>
            <td>
                <a href="/ver_contacto/$contacto['id_contacto']">Ver</a> |
                <a href="/editar_contacto/$contacto['id_contacto']">Editar</a> |
                <form action="/borrar_contacto/$contacto['id_contacto']" method="post" style="display:inline;">
                    <button type="submit">Borrar</button>
                </form>
            </td>
        </tr>
